services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kompyuter-tarmoqlari-app
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["start-container"]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: network_learning
      DB_USERNAME: laravel
      DB_PASSWORD: laravel_secret
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    ports:
      - "5173:5173"
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: kompyuter-tarmoqlari-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: kompyuter-tarmoqlari-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: network_learning
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ularavel", "-plaravel_secret"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  vendor_data:
  node_modules_data:
